<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saath & Co - Contact</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=4">
</head>

<body class="theme-almond">
  <div class="swirl-overlay"></div>
  <nav class="navbar">
    <a href="/" class="logo magnetic">SAATH & CO</a>
    <div class="menu-toggle">
      <span class="bar"></span>
      <span class="bar"></span>
    </div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about/">About Us</a></li>
      <li><a href="/services/">Services</a></li>
      <li><a href="/portfolio/">Portfolio</a></li>
      <li><a href="/contact/">Contact</a></li>
    </ul>
  </nav>
  <main>
    <section class="container hero"> <!-- Top section stays Almond Cream -->
      <div class="gradient-aura" style="top: 40%; left: 30%;"></div>
      <div class="content anim-target fade-up visible">
        <h1 class="headline reveal-text gradient-text">Get In Touch</h1>
        <p class="subheadline">Start your brand journey with us today.</p>
      </div>
    </section>

    <!-- Scrolling to the massively styled links triggers the theme change -->
    <section class="container section-pad theme-trigger">
      <div class="massive-links">
        <a href="mailto:Connect@saathandco.com" class="massive-link anim-target fade-right">Email Us</a>
        <a href="https://www.instagram.com/saathandco_official/" target="_blank"
          class="massive-link anim-target fade-left" style="transition-delay: 0.1s;">Instagram</a>
        <a href="https://www.linkedin.com/company/saathandco/posts/?feedView=all" target="_blank"
          class="massive-link anim-target fade-right" style="transition-delay: 0.2s;">LinkedIn</a>
        <a href="#" target="_blank" class="massive-link anim-target fade-left"
          style="transition-delay: 0.3s;">Behance</a>
        <a href="#" target="_blank" class="massive-link anim-target fade-right"
          style="transition-delay: 0.4s;">Facebook</a>
      </div>
    </section>
    <!-- Form Section -->
    <section class="container section-pad">
      <div class="glass-panel anim-target fade-up">
        <h2 class="section-title">Drop us a line</h2>
        <p class="section-text">Fill out the form below and we'll get back to you as soon as possible.</p>
        <form action="https://formsubmit.co/connect@saathandco.com" method="POST" class="contact-form">
          <input type="text" name="_honey" style="display:none">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required class="form-input">
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="Your Email" required class="form-input">
          </div>
          <div class="form-group">
            <input type="text" name="subject" placeholder="Subject" required class="form-input">
          </div>
          <div class="form-group">
            <textarea name="message" placeholder="Your Message" required class="form-input" rows="5"></textarea>
          </div>
          <div>
            <button type="submit" class="cta-button magnetic" style="border: none;">Send Message</button>
          </div>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="/main.js"></script>
</body>

</html>
